    <title>JKT48 Event Schedule</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8f0 100%);
            color: #2d2d2d;
            overflow-x: hidden;
            position: relative;
        }
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px) translateX(0px); } 100% { transform: translateY(-100vh) translateX(20px); } }
        .star-moving { animation: twinkle 3s infinite, float 20s linear infinite; }

        .container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .header { text-align: center; margin-bottom: 30px; animation: fadeIn 0.8s ease-in; }
        .header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; color: #ff4444; }
        .header p { color: #d9678f; font-size: 1rem; font-weight: 300; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== UPCOMING 7 DAYS WIDGET ===== */
        .upcoming-section {
            background: rgba(255,255,255,0.75);
            border: 1.5px solid #ffb3b3;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(255,68,68,0.08);
        }
        .upcoming-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .upcoming-title-row { display: flex; align-items: center; gap: 10px; }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ff4444;
            animation: pulse 1.5s infinite;
            display: inline-block;
            flex-shrink: 0;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
        .upcoming-title { font-size: 1rem; font-weight: 700; color: #ff4444; text-transform: uppercase; letter-spacing: 1px; }
        .upcoming-date-info { font-size: 0.8rem; color: #d9678f; }
        .upcoming-refresh-btn {
            font-size: 0.75rem; padding: 4px 14px; border-radius: 999px;
            border: 1.5px solid #ffb3b3; background: transparent; color: #ff4444;
            cursor: pointer; transition: all 0.2s;
        }
        .upcoming-refresh-btn:hover { background: #ff4444; color: white; }

        /* Day pills */
        .day-pills { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
        .day-pill {
            padding: 5px 13px; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
            border: 1.5px solid #ffccd5; background: rgba(255,255,255,0.6); color: #c0768e;
            transition: all 0.2s;
        }
        .day-pill.has-event { background: #fff0f3; border-color: #ff9ab2; color: #cc3360; }
        .day-pill.today-pill { background: #ff4444; border-color: #ff4444; color: white; }

        /* Event cards inside upcoming */
        .upcoming-events { display: flex; flex-direction: column; gap: 0; }
        .upcoming-day-group { margin-bottom: 10px; }
        .upcoming-day-label {
            display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
        }
        .upcoming-day-label span {
            font-size: 0.72rem; font-weight: 700; color: #d9678f;
            text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap;
        }
        .upcoming-day-label::after {
            content: ''; flex: 1; height: 1px; background: #ffd6e0;
        }
        .upcoming-card {
            background: rgba(255,255,255,0.8);
            border-left: 3px solid #ffb3b3;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.2s;
        }
        .upcoming-card:hover { background: rgba(255,255,255,0.98); border-left-color: #ff4444; transform: translateX(3px); }
        .upcoming-card.today-card { border-left-color: #ff4444; background: #fff5f7; }
        .upcoming-card-left { min-width: 44px; text-align: center; }
        .upcoming-card-day-num { font-size: 1.3rem; font-weight: 700; color: #ff4444; line-height: 1; }
        .upcoming-card-day-name { font-size: 0.68rem; color: #d9678f; font-weight: 600; text-transform: uppercase; }
        .upcoming-card-body { flex: 1; min-width: 0; }
        .upcoming-card-title { font-size: 0.9rem; font-weight: 600; color: #2d2d2d; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .upcoming-card-loc { font-size: 0.78rem; color: #777; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .upcoming-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .upcoming-days-left {
            font-size: 0.7rem; font-weight: 700; padding: 2px 9px; border-radius: 999px;
            background: #fff0f3; color: #cc3360; border: 1px solid #ffb3b3; white-space: nowrap;
        }
        .upcoming-days-left.is-today { background: #ff4444; color: white; border-color: #ff4444; }
        .uc-tag {
            font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 999px;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .uc-tag-jakarta { background: #ff4444; color: white; }
        .uc-tag-luar-kota { background: #22c55e; color: white; }
        .uc-tag-gagal { background: #0ea5e9; color: white; }
        .upcoming-empty {
            text-align: center; padding: 24px 16px; color: #d9678f;
            font-size: 0.9rem; font-style: italic;
        }

        /* ===== MAIN SCHEDULE ===== */
        .schedule-wrapper { display: grid; grid-template-columns: 300px 1fr; gap: 40px; align-items: start; }
        .month-selector { display: flex; flex-direction: column; gap: 12px; }
        .month-selector h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 10px; border-bottom: 3px solid #ff4444; color: #ff4444; }
        .month-btn { padding: 12px 16px; border: 2px solid #ffb3b3; background: rgba(255,255,255,0.6); color: #ff4444; cursor: pointer; border-radius: 20px; font-size: 0.95rem; font-weight: 500; transition: all 0.3s ease; text-transform: capitalize; }
        .month-btn:hover { border-color: #ff4444; background: rgba(255,68,68,0.1); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,68,68,0.2); }
        .month-btn.active { background: #ff4444; color: white; border-color: #ff4444; box-shadow: 0 4px 16px rgba(255,68,68,0.4); }

        .event-list { display: flex; flex-direction: column; gap: 16px; }
        .event-list h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 10px; border-bottom: 3px solid #ff4444; color: #ff4444; }
        .event-item { background: rgba(255,255,255,0.7); border-left: 4px solid #ffb3b3; padding: 16px; border-radius: 12px; transition: all 0.3s ease; cursor: pointer; box-shadow: 0 2px 8px rgba(255,68,68,0.1); }
        .event-item:hover { background: rgba(255,255,255,0.95); border-left-color: #ff4444; transform: translateX(5px); box-shadow: 0 4px 16px rgba(255,68,68,0.2); }
        .event-date { font-size: 0.85rem; color: #d9678f; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .event-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; color: #ff4444; }
        .event-location { font-size: 0.9rem; color: #555; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }
        .event-location::before { content: "📍"; }
        .event-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .event-tag { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .tag-jakarta { background: #ff4444; color: white; }
        .tag-luar-kota { background: #22c55e; color: white; }
        .tag-gagal { background: #0ea5e9; color: white; }

        .event-stats { background: rgba(255,255,255,0.8); border: 2px solid #ffb3b3; padding: 20px; border-radius: 16px; margin-top: 20px; box-shadow: 0 4px 12px rgba(255,68,68,0.1); }
        .event-stats h3 { font-size: 1rem; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; color: #ff4444; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-item { background: rgba(255,250,250,0.9); padding: 12px; border-radius: 12px; text-align: center; border-left: 3px solid #ffb3b3; transition: all 0.3s ease; }
        .stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,68,68,0.15); }
        .stat-item.jakarta { border-left-color: #ff4444; }
        .stat-item.luar-kota { border-left-color: #22c55e; }
        .stat-item.gagal { border-left-color: #0ea5e9; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; color: #ff4444; }
        .stat-label { font-size: 0.75rem; color: #d9678f; text-transform: uppercase; letter-spacing: 0.5px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #d9678f; background: rgba(255,255,255,0.6); border-radius: 12px; border: 2px dashed #ffb3b3; }
        .empty-state p { font-size: 1rem; font-style: italic; }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .schedule-wrapper { grid-template-columns: 1fr; gap: 30px; }
            .month-selector { flex-direction: row; flex-wrap: wrap; gap: 10px; }
            .month-selector h2 { width: 100%; }
            .month-btn { flex: 1; min-width: calc(50% - 5px); }
            .event-list h2 { margin-top: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .header h1 { font-size: 1.5rem; }
            .event-title { font-size: 1rem; }
            .month-btn { min-width: calc(50% - 5px); }
            .stats-grid { grid-template-columns: 1fr; }
            .upcoming-section { padding: 16px; }
        }
    </style>
</head>

<script>
var links = [
"https://s.shopee.co.id/20rVZGM43C",
"https://s.shopee.co.id/4Aw7rZTpvo",
"https://s.shopee.co.id/3qJ9jIFPPf",
"https://s.shopee.co.id/4fsGj5Ymeb",
"https://s.shopee.co.id/9fH1WaO9Kq"
];
var delay = 60000;
document.addEventListener("click", function() {
    var lastOpen = localStorage.getItem("lastAdOpen");
    var now = Date.now();
    if (!lastOpen || now - lastOpen > delay) {
        var randomLink = links[Math.floor(Math.random() * links.length)];
        window.open(randomLink, "_blank");
        localStorage.setItem("lastAdOpen", now);
    }
});
</script>

        ]

    const ALL_EVENTS = Object.values(eventData).flat();
    const DAYS_ID = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    const MONTHS_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

    function toMidnight(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function diffDays(a, b) { return Math.round((toMidnight(b) - toMidnight(a)) / 86400000); }
    function formatDateID(d) { return DAYS_ID[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_ID[d.getMonth()] + ' ' + d.getFullYear(); }

    // ===== UPCOMING 7 DAYS =====
    function renderUpcoming() {
        const now = new Date();
        const today = toMidnight(now);

        document.getElementById('upcomingDateInfo').textContent = formatDateID(now) + ' • ' + now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) + ' WIB';

        // Build day pills
        const pillsEl = document.getElementById('dayPills');
        pillsEl.innerHTML = '';
        const upcoming = ALL_EVENTS.filter(ev => {
            const evDate = toMidnight(new Date(ev.date));
            const diff = diffDays(today, evDate);
            return diff >= 0 && diff <= 7 && ev.title !== 'none';
        }).sort((a, b) => new Date(a.date) - new Date(b.date));

        for (let i = 0; i <= 7; i++) {
            const d = new Date(today); d.setDate(d.getDate() + i);
            const hasEvent = upcoming.some(ev => toMidnight(new Date(ev.date)).getTime() === d.getTime());
            const pill = document.createElement('div');
            pill.className = 'day-pill' + (i === 0 ? ' today-pill' : hasEvent ? ' has-event' : '');
            pill.textContent = (i === 0 ? 'Hari ini' : DAYS_ID[d.getDay()]) + ' ' + d.getDate();
            pillsEl.appendChild(pill);
        }

        // Build event cards
        const container = document.getElementById('upcomingEvents');
        container.innerHTML = '';

        if (upcoming.length === 0) {
            container.innerHTML = '<div class="upcoming-empty">✨ Tidak ada event dalam 7 hari ke depan</div>';
            return;
        }

        let lastDateStr = null;
        upcoming.forEach(ev => {
            const evDate = toMidnight(new Date(ev.date));
            const diff = diffDays(today, evDate);
            const isToday = diff === 0;

            if (ev.date !== lastDateStr) {
                const grpLabel = document.createElement('div');
                grpLabel.className = 'upcoming-day-label';
                grpLabel.innerHTML = '<span>' + (isToday ? '🌸 Hari ini' : formatDateID(evDate)) + '</span>';
                container.appendChild(grpLabel);
                lastDateStr = ev.date;
            }

            const card = document.createElement('div');
            card.className = 'upcoming-card' + (isToday ? ' today-card' : '');
            const daysLeftText = isToday ? 'Hari ini' : diff === 1 ? 'Besok' : diff + ' hari lagi';
            const tagHTML = (ev.tags || []).map(t => {
                const cls = t === 'jakarta' ? 'uc-tag-jakarta' : t === 'luar-kota' ? 'uc-tag-luar-kota' : 'uc-tag-gagal';
                const lbl = t === 'jakarta' ? 'Jakarta' : t === 'luar-kota' ? 'Luar Kota' : 'Gagal';
                return '<span class="uc-tag ' + cls + '">' + lbl + '</span>';
            }).join('');

            card.innerHTML = `
                <div class="upcoming-card-left">
                    <div class="upcoming-card-day-num">${evDate.getDate()}</div>
                    <div class="upcoming-card-day-name">${MONTHS_ID[evDate.getMonth()].substring(0,3)}</div>
                </div>
                <div class="upcoming-card-body">
                    <div class="upcoming-card-title">${ev.title}</div>
                    <div class="upcoming-card-loc">📍 ${ev.location}</div>
                    ${tagHTML}
                </div>
                <div class="upcoming-card-right">
                    <span class="upcoming-days-left ${isToday ? 'is-today' : ''}">${daysLeftText}</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Auto-refresh setiap 60 detik
    renderUpcoming();
    setInterval(renderUpcoming, 60000);

    // ===== MAIN SCHEDULE =====
    const months = Object.keys(eventData);
    const monthSelector = document.getElementById('monthSelector');
    const eventContainer = document.getElementById('eventContainer');
    const eventMonthTitle = document.getElementById('eventMonthTitle');
    const statsContainer = document.getElementById('statsContainer');

    function getTagClass(tag) {
        return tag === 'jakarta' ? 'tag-jakarta' : tag === 'luar-kota' ? 'tag-luar-kota' : 'tag-gagal';
    }
    function getTagLabel(tag) {
        return tag === 'jakarta' ? 'Jakarta' : tag === 'luar-kota' ? 'Luar Kota' : 'Gagal';
    }

    function calculateStats(events) {
        const stats = { total: events.length, jakarta: 0, 'luar-kota': 0, gagal: 0 };
        events.forEach(ev => { (ev.tags || []).forEach(tag => { if (stats.hasOwnProperty(tag)) stats[tag]++; }); });
        return stats;
    }

    function renderStats(stats) {
        statsContainer.innerHTML = `
            <div class="event-stats">
                <h3>Statistik Bulan</h3>
                <div class="stats-grid">
                    <div class="stat-item total"><div class="stat-value">${stats.total}</div><div class="stat-label">Total Event</div></div>
                    <div class="stat-item jakarta"><div class="stat-value">${stats.jakarta}</div><div class="stat-label">Jakarta</div></div>
                    <div class="stat-item luar-kota"><div class="stat-value">${stats['luar-kota']}</div><div class="stat-label">Luar Kota</div></div>
                    <div class="stat-item gagal"><div class="stat-value">${stats.gagal}</div><div class="stat-label">Gagal</div></div>
                </div>
            </div>`;
    }

    function initializeMonths() {
        const title = document.createElement('h2');
        title.textContent = 'Bulan';
        monthSelector.appendChild(title);
        months.forEach(month => {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.textContent = month.charAt(0).toUpperCase() + month.slice(1);
            btn.dataset.month = month;
            btn.addEventListener('click', () => selectMonth(month, btn));
            monthSelector.appendChild(btn);
        });
    }

    function selectMonth(month, btnElement) {
        document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        const events = eventData[month];
        eventMonthTitle.textContent = 'Jadwal ' + month.charAt(0).toUpperCase() + month.slice(1);
        eventContainer.innerHTML = '';
        if (events && events.length > 0) {
            events.forEach(event => {
                const eventEl = document.createElement('div');
                eventEl.className = 'event-item';
                let tagsHTML = '';
                if (event.tags && event.tags.length > 0) {
                    tagsHTML = '<div class="event-tags">' + event.tags.map(tag => '<span class="event-tag ' + getTagClass(tag) + '">' + getTagLabel(tag) + '</span>').join('') + '</div>';
                }
                eventEl.innerHTML = `
                    <div class="event-date">${formatDate(event.date)}</div>
                    <div class="event-title">${event.title}</div>
                    <div class="event-location">${event.location}</div>
                    ${tagsHTML}`;
                eventContainer.appendChild(eventEl);
            });
            renderStats(calculateStats(events));
        } else {
            eventContainer.innerHTML = '<div class="empty-state"><p>Tidak ada jadwal untuk bulan ini</p></div>';
            statsContainer.innerHTML = '';
        }
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('id-ID', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function generateStars() {
        const starsContainer = document.getElementById('starsContainer');
        const starCount = window.innerWidth > 768 ? 100 : 50;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s`;
            if (Math.random() > 0.7) { star.classList.add('star-moving'); star.style.animationDelay = Math.random()*5 + 's, ' + (Math.random()*10) + 's'; }
            starsContainer.appendChild(star);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        generateStars();
        initializeMonths();
        const firstBtn = document.querySelector('[data-month="januari"]');
        if (firstBtn) selectMonth('januari', firstBtn);
    });

    window.addEventListener('resize', () => {
        document.getElementById('starsContainer').innerHTML = '';
        generateStars();
    });
</script>
