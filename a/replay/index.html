<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replay Show Ramadhan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .password-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .password-box h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .password-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .password-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .password-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .password-box button:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }

        .content-container {
            display: none;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
        }

        .content {
            max-width: 1000px;
            margin: 0 auto;
        }

        .content h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .shows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .show-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .show-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .show-card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .show-card-header h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .show-date {
            font-size: 14px;
            opacity: 0.9;
        }

        .show-card-body {
            padding: 20px;
        }

        .show-card-body a {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .show-card-body a:hover {
            transform: scale(1.05);
        }

        .logout-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        .logout-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .password-box {
                margin: 20px;
            }

            .content h1 {
                font-size: 24px;
            }

            .shows-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Password Container -->
    <div class="password-container" id="passwordContainer">
        <div class="password-box">
            <h1>🔒 Akses Dikunci</h1>
            <p>Masukkan password untuk melanjutkan</p>
            <input 
                type="password" 
                id="passwordInput" 
                placeholder="Masukkan password..."
                onkeypress="if(event.key === 'Enter') checkPassword()"
            >
            <button onclick="checkPassword()">Buka Akses</button>
            <div class="error-message" id="errorMessage">Password salah. Coba lagi.</div>
        </div>
    </div>

    <!-- Content Container -->
    <div class="content-container" id="contentContainer">
        <button class="logout-btn" id="logoutBtn" onclick="logout()">Keluar</button>
        <div class="content">
            <h1>🎬 Replay Show Ramadhan</h1>
            <div class="shows-grid" id="showsGrid"></div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "48membership";

        const shows = [
            { title: "Z VS ALPHA", date: "21 Feb 2026", link: "https://youtu.be/CkzO8P0OxHo" },
            { title: "JKT48 SCHOOL", date: "22 Feb 2026", link: "https://youtu.be/R3Q2RbuvYIE" },
            { title: "SELEKSI PMDK 2026", date: "26 Feb 2026", link: "https://youtu.be/X6DB_5sS-RU" },
            { title: "ANDAI 'KU BUKAN IDOLA", date: "27 Feb 2026", link: "https://youtu.be/yAVaX_gjElU" },
            { title: "JKT48 FIGHT: LOVE DREAM PASSION", date: "28 Feb 2026", link: "https://youtu.be/0VWS2leDPcI" },
            { title: "JKT48 SCHOOL", date: "1 Mar 2026", link: "https://youtu.be/tHvI8-L6QiA" },
            { title: "JKT48 FIGHT: LOVE DREAM PASSION", date: "4 Mar 2026", link: "https://youtu.be/QlFY1AJoF_U" },
            { title: "THE CHALLENGERS", date: "5 Mar 2026", link: "https://youtu.be/VqdV0L4tdfE" },
            { title: "ANDAI 'KU BUKAN IDOLA", date: "6 Mar 2026", link: "https://youtu.be/lIT0iNCh23Q" },
            { title: "JKT48 SCHOOL", date: "8 Mar 2026", link: "https://youtu.be/LCw-4KqGATQ" },
            { title: "JKT48 FIGHT: LOVE DREAM PASSION", date: "13 Mar 2026", link: "https://youtu.be/FjxhKhYXr5o" },
            { title: "SELEKSI PMDK 2026", date: "14 Mar 2026", link: "https://youtu.be/SPksbWxzTg0" },
            { title: "JKT48 SCHOOL", date: "15 Mar 2026", link: "https://youtu.be/xADcwGehI5Y" },
            { title: "ANDAI 'KU BUKAN IDOLA", date: "16 Mar 2026", link: "https://youtu.be/hK6DCNFz0QQ" }
        ];

        function checkPassword() {
            const passwordInput = document.getElementById("passwordInput");
            const errorMessage = document.getElementById("errorMessage");
            
            if (passwordInput.value === CORRECT_PASSWORD) {
                // Password benar
                document.getElementById("passwordContainer").style.display = "none";
                document.getElementById("contentContainer").style.display = "block";
                document.getElementById("logoutBtn").style.display = "block";
                loadShows();
                // Simpan status login di session
                sessionStorage.setItem("authenticated", "true");
            } else {
                // Password salah
                errorMessage.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        function loadShows() {
            const showsGrid = document.getElementById("showsGrid");
            showsGrid.innerHTML = "";
            
            shows.forEach(show => {
                const card = document.createElement("div");
                card.className = "show-card";
                card.innerHTML = `
                    <div class="show-card-header">
                        <h3>${show.title}</h3>
                        <p class="show-date">📅 ${show.date}</p>
                    </div>
                    <div class="show-card-body">
                        <a href="${show.link}" target="_blank">▶️ Tonton di YouTube</a>
                    </div>
                `;
                showsGrid.appendChild(card);
            });
        }

        function logout() {
            document.getElementById("passwordContainer").style.display = "flex";
            document.getElementById("contentContainer").style.display = "none";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("passwordInput").value = "";
            document.getElementById("errorMessage").style.display = "none";
            sessionStorage.removeItem("authenticated");
            document.getElementById("passwordInput").focus();
        }

        // Cek apakah sudah login saat halaman dimuat
        window.addEventListener("load", function() {
            if (sessionStorage.getItem("authenticated") === "true") {
                document.getElementById("passwordContainer").style.display = "none";
                document.getElementById("contentContainer").style.display = "block";
                document.getElementById("logoutBtn").style.display = "block";
                loadShows();
            } else {
                document.getElementById("passwordInput").focus();
            }
        });

        // Fokus ke input password saat error
        document.getElementById("passwordInput").addEventListener("focus", function() {
            document.getElementById("errorMessage").style.display = "none";
        });
    </script>
</body>
</html>
