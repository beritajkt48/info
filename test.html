<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT48 Team Fight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid white;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
        }

        .tab-btn.active {
            background: #FF0000;
            color: white;
            border-color: #FF0000;
        }

        /* Members Grid */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .member-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .member-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        /* Photo Frame Styling */
        .member-photo-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        /* Frame untuk Team Dream, Love, Passion (merah/pink) */
        .member-photo-container.frame-red {
            background: #FF4444;
            padding: 20px;
            aspect-ratio: 1 / 1.15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .member-photo-container.frame-red::before {
            content: '★';
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 28px;
            color: #FFEB3B;
            z-index: 10;
        }

        .member-photo-container.frame-red::after {
            content: '★';
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 28px;
            color: #FFEB3B;
            z-index: 10;
        }

        .member-photo-container.frame-red .inner-frame {
            width: 100%;
            height: 100%;
            border: 8px solid #FF69B4;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Frame untuk Team Trainee (oranye) */
        .member-photo-container.frame-orange {
            background: #FF9500;
            padding: 20px;
            aspect-ratio: 1 / 1.15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .member-photo-container.frame-orange::before {
            content: '★';
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 28px;
            color: #FFEB3B;
            z-index: 10;
        }

        .member-photo-container.frame-orange::after {
            content: '★';
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 28px;
            color: #FFEB3B;
            z-index: 10;
        }

        .member-photo-container.frame-orange .inner-frame {
            width: 100%;
            height: 100%;
            border: 8px solid #FFFFEE;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .member-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
        }

        .member-info {
            padding: 20px;
            text-align: center;
            background: white;
        }

        .member-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 5px;
        }

        .member-nickname {
            font-size: 0.9em;
            color: #FF0000;
            margin-bottom: 15px;
            font-style: italic;
        }

        .member-details {
            font-size: 0.9em;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .member-details strong {
            color: #FF0000;
        }

        .member-socials {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .social-btn {
            padding: 8px 12px;
            font-size: 0.85em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
            min-width: 70px;
        }

        .social-twitter {
            background: #1a1a1a;
            border: 2px solid #1a1a1a;
        }

        .social-twitter:hover {
            background: #333;
            border-color: #333;
            transform: translateY(-2px);
        }

        .social-instagram {
            background: #FF0000;
            border: 2px solid #FF0000;
        }

        .social-instagram:hover {
            background: #cc0000;
            border-color: #cc0000;
            transform: translateY(-2px);
        }

        .social-tiktok {
            background: #1a1a1a;
            border: 2px solid #1a1a1a;
        }

        .social-tiktok:hover {
            background: #333;
            border-color: #333;
            transform: translateY(-2px);
        }

        .social-showroom {
            background: #FF0000;
            border: 2px solid #FF0000;
        }

        .social-showroom:hover {
            background: #cc0000;
            border-color: #cc0000;
            transform: translateY(-2px);
        }

        .social-idnlive {
            background: #FF0000;
            border: 2px solid #FF0000;
        }

        .social-idnlive:hover {
            background: #cc0000;
            border-color: #cc0000;
            transform: translateY(-2px);
        }

        /* Hidden tab content */
        .team-content {
            display: none;
        }

        .team-content.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .members-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .member-photo-container {
                aspect-ratio: 1 / 1.1;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5em;
            }

            .members-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                gap: 10px;
            }

            .tab-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>

        function createMemberCard(member, frameClass) {
            const card = document.createElement('div');
            card.className = 'member-card';
            card.innerHTML = `
                <div class="member-photo-container ${frameClass}">
                    <div class="inner-frame">
                        <img src="${member.photo}" alt="${member.name}" class="member-photo">
                    </div>
                </div>
                <div class="member-info">
                    <div class="member-name">${member.name}</div>
                    <div class="member-nickname">"${member.nickname}"</div>
                    <div class="member-details">
                        <strong>Lahir:</strong> ${member.birthDate}<br>
                        <strong>Golongan Darah:</strong> ${member.bloodType}<br>
                        <strong>Zodiak:</strong> ${member.zodiac}<br>
                        <strong>Tinggi:</strong> ${member.height}
                    </div>
                    <div class="member-socials">
                        <a href="https://${member.socials.twitter}" target="_blank" class="social-btn social-twitter">Twitter</a>
                        <a href="https://${member.socials.instagram}" target="_blank" class="social-btn social-instagram">Instagram</a>
                        <a href="https://${member.socials.tiktok}" target="_blank" class="social-btn social-tiktok">TikTok</a>
                        <a href="https://${member.socials.showroom}" target="_blank" class="social-btn social-showroom">Showroom</a>
                        <a href="https://${member.socials.idnlive}" target="_blank" class="social-btn social-idnlive">IDN Live</a>
                    </div>
                </div>
            `;
            return card;
        }

        function loadTeam(teamName) {
            const gridId = teamName + 'Grid';
            const grid = document.getElementById(gridId);
            const team = teamData[teamName];
            const frameClass = teamName === 'trainee' ? 'frame-orange' : 'frame-red';

            grid.innerHTML = '';
            team.forEach(member => {
                grid.appendChild(createMemberCard(member, frameClass));
            });
        }

        function switchTeam(teamName) {
            // Hide all team contents
            document.querySelectorAll('.team-content').forEach(content => {
                content.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected team
            document.getElementById(teamName).classList.add('active');

            // Add active class to clicked button
            event.target.classList.add('active');

            // Load team data
            loadTeam(teamName);
        }

        // Load Dream team on page load
        window.addEventListener('load', () => {
            loadTeam('dream');
            loadTeam('love');
            loadTeam('passion');
            loadTeam('trainee');
        });
    </script>
</body>
</html>
