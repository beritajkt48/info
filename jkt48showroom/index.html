<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>JKT48 Showroom - BERITA JKT48</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/duration.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/id.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBBlV8_o0VoiYU65O5c7uVnyxq6cdpxLJW",
            authDomain: "jakarta-48.firebaseapp.com",
            databaseURL: "https://jakarta-48-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jakarta-48",
            storageBucket: "jakarta-48.firebasestorage.app",
            messagingSenderId: "1902243343338",
            appId: "1:1902243343338:web:da6065dcd7f5138de9711b"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.fbDatabase = db;
        window.fbRef = ref;
        window.fbSet = set;
        window.fbGet = get;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffd60a 0%, #ffc300 50%, #ffb703 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 179, 71, 0.3);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(255, 107, 53, 0.15);
        }
        
        .jkt48-header {
            background: linear-gradient(135deg, #d62828 0%, #f77f00 50%, #ff6b35 100%);
            box-shadow: 0 10px 40px rgba(214, 40, 40, 0.25);
        }
        
        .ranking-row-1 {
            background: linear-gradient(to right, rgba(255, 179, 71, 0.15), transparent);
        }
        
        .ranking-row-2 {
            background: linear-gradient(to right, rgba(255, 179, 71, 0.08), transparent);
        }
        
        .ranking-row-3 {
            background: linear-gradient(to right, rgba(255, 179, 71, 0.04), transparent);
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #ff6b35;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        
        .live-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 14px;
        }
        
        .rank-1 {
            background: linear-gradient(135deg, #ffd60a, #ffb703);
            color: #d62828;
        }
        
        .rank-2 {
            background: linear-gradient(135deg, #c1c1c1, #e8e8e8);
            color: #333;
        }
        
        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #e6b87f);
            color: #fff;
        }
        
        .member-card {
            transition: all 0.3s ease;
        }
        
        .member-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.2) !important;
        }
        
        .stat-box {
            background: linear-gradient(135deg, rgba(255, 179, 71, 0.1), rgba(255, 107, 53, 0.05));
            border-left: 4px solid #ff6b35;
        }
    </style>
</head>
<body class="p-4 md:p-10" oncontextmenu="return false">
    <div id="capture-area" class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="jkt48-header rounded-3xl p-8 mb-10 text-white shadow-2xl">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-white rounded-2xl shadow-lg">
                        <img class="w-14 h-14 rounded-lg" 
                             src="https://static.showroom-live.com/assets/img/logo_guidelines/icon.png?t=1667879554" 
                             alt="JKT48 Logo">
                    </div>
                    <div>
                        <h1 class="text-4xl md:text-5xl font-bold text-white drop-shadow-lg">JKT48 Showroom</h1>
                        <p class="text-lg md:text-xl font-semibold text-orange-100 mt-2">BERITA JKT48</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-orange-100 text-sm font-medium">Update Terbaru</p>
                    <p id="update-time" class="text-white font-semibold text-lg">Loading...</p>
                </div>
            </div>
        </header>

        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div class="stat-box glass-card p-6 rounded-xl">
                <p class="text-gray-600 font-medium text-sm uppercase tracking-wide">Total Member</p>
                <p id="total-members" class="gradient-text text-4xl font-bold mt-2">-</p>
            </div>
            <div class="stat-box glass-card p-6 rounded-xl">
                <p class="text-gray-600 font-medium text-sm uppercase tracking-wide">Total Points</p>
                <p id="total-points" class="gradient-text text-4xl font-bold mt-2">-</p>
            </div>
            <div class="stat-box glass-card p-6 rounded-xl">
                <p class="text-gray-600 font-medium text-sm uppercase tracking-wide">Pembaruan</p>
                <p id="last-updated" class="gradient-text text-4xl font-bold mt-2">-</p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="glass-card p-8 rounded-3xl shadow-xl mb-10">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl md:text-3xl font-bold gradient-text">Top Member JKT48</h2>
                <div class="flex items-center gap-2">
                    <div class="loader"></div>
                    <span class="text-sm font-medium text-gray-600">Live</span>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading" class="text-center py-12">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-gray-500 font-medium">Loading data member JKT48...</p>
            </div>

            <!-- Member List -->
            <div id="member-list" class="space-y-3 hidden">
                <!-- Member items will be inserted here -->
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden text-center py-12">
                <p class="text-red-500 font-semibold mb-4">⚠️ Gagal memuat data</p>
                <button onclick="location.reload()" 
                        class="px-6 py-2 bg-gradient-to-r from-red-500 to-orange-500 text-white rounded-lg font-semibold hover:shadow-lg transition-all">
                    Coba Lagi
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center py-8 text-gray-700">
            <p class="font-medium mb-2">JKT48 Showroom - Berita & Ranking Member</p>
            <p class="text-sm text-gray-600">Data dari Official Showroom Platform</p>
            <p class="text-xs text-gray-500 mt-4">© 2024 JKT48. All rights reserved.</p>
        </footer>
    </div>

    <script>
        dayjs.extend(window.dayjs_plugin_relativeTime);
        dayjs.extend(window.dayjs_plugin_duration);
        dayjs.locale('id');

        const ROOM_ID = "35265046";
        const FIREBASE_PATH = "rooms/jkt48";

        async function fetchDataFromShowroom() {
            try {
                const response = await fetch(`https://showroom-api.herokuapp.com/api/member/room_id/${ROOM_ID}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data && Array.isArray(data)) {
                    // Save to Firebase
                    const db = window.fbDatabase;
                    const ref = window.fbRef;
                    const set = window.fbSet;
                    
                    await set(ref(db, FIREBASE_PATH), {
                        members: data,
                        lastUpdated: new Date().toISOString()
                    });
                    
                    renderMembers(data);
                    updateStats(data);
                    updateTime();
                } else {
                    throw new Error("Format data tidak valid");
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("error-state").classList.remove("hidden");
            }
        }

        async function loadDataFromFirebase() {
            try {
                const db = window.fbDatabase;
                const ref = window.fbRef;
                const get = window.fbGet;
                
                const snapshot = await get(ref(db, FIREBASE_PATH));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data && data.members && Array.isArray(data.members)) {
                        renderMembers(data.members);
                        updateStats(data.members);
                        updateTime();
                    }
                }
            } catch (error) {
                console.error("Firebase load error:", error);
            }
        }

        function renderMembers(members) {
            const memberList = document.getElementById("member-list");
            memberList.innerHTML = "";

            if (members.length === 0) {
                memberList.innerHTML = '<p class="text-center text-gray-500 py-8">Tidak ada data member</p>';
                document.getElementById("loading").classList.add("hidden");
                memberList.classList.remove("hidden");
                return;
            }

            // Sort by points (highest first)
            const sortedMembers = [...members].sort((a, b) => (b.point || 0) - (a.point || 0));

            sortedMembers.forEach((member, index) => {
                const rankClass = index === 0 ? "rank-1" : index === 1 ? "rank-2" : index === 2 ? "rank-3" : "";
                const rowClass = index === 0 ? "ranking-row-1" : index === 1 ? "ranking-row-2" : index === 2 ? "ranking-row-3" : "";

                const memberHTML = `
                    <div class="member-card ${rowClass} p-4 md:p-6 rounded-2xl flex items-center justify-between gap-4 transition-all hover:shadow-lg">
                        <div class="flex items-center gap-4 flex-1">
                            <div class="rank-badge ${rankClass}">
                                ${index + 1}
                            </div>
                            <div class="flex-1">
                                <h3 class="font-bold text-lg md:text-xl text-gray-800">${member.name || "Unknown"}</h3>
                                <p class="text-sm text-gray-600 mt-1">JKT48 Member</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-xl md:text-2xl gradient-text">${(member.point || 0).toLocaleString('id-ID')}</p>
                            <p class="text-xs md:text-sm text-gray-600 font-medium mt-1">Points</p>
                        </div>
                    </div>
                `;
                memberList.innerHTML += memberHTML;
            });

            document.getElementById("loading").classList.add("hidden");
            memberList.classList.remove("hidden");
        }

        function updateStats(members) {
            const totalMembers = members.length;
            const totalPoints = members.reduce((sum, m) => sum + (m.point || 0), 0);
            
            document.getElementById("total-members").textContent = totalMembers;
            document.getElementById("total-points").textContent = totalPoints.toLocaleString("id-ID");
            document.getElementById("last-updated").textContent = new Date().toLocaleDateString("id-ID", { 
                day: "numeric", 
                month: "short" 
            });
        }

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString("id-ID", { 
                hour: "2-digit", 
                minute: "2-digit" 
            });
            document.getElementById("update-time").textContent = timeString;
        }

        // Initialize - Load cached data first, then fetch fresh data
        async function init() {
            await loadDataFromFirebase();
            await fetchDataFromShowroom();
        }

        // Fetch data on page load
        init();

        // Refresh data every 30 seconds
        setInterval(() => {
            fetchDataFromShowroom().catch(e => console.error("Auto-refresh error:", e));
        }, 30000);
    </script>
</body>
</html>
